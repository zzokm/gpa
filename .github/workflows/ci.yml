name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=low
      - name: Summary
        if: always()
        run: |
          {
            echo "## Audit"
            echo ""
            echo "- Node: 20"
            echo "- Command: \`npm audit --audit-level=low\`"
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Summary
        if: always()
        run: |
          {
            echo "## Lint"
            echo ""
            echo "- Command: \`npm run lint\`"
            echo "- Policy: ESLint warnings must be 0"
          } >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - name: Summary
        if: always()
        run: |
          {
            echo "## Typecheck"
            echo ""
            echo "- Command: \`npm run typecheck\`"
          } >> "$GITHUB_STEP_SUMMARY"

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          {
            echo "## Unit tests"
            echo ""
            echo "- Command: \`npm run test:coverage\`"
            echo "- Artifact: \`coverage\` (7 days)"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [audit, lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/cache/save@v4
        if: always()
        with:
          path: .next/cache
          key: next-cache-${{ github.sha }}
      - name: Summary
        if: always()
        run: |
          {
            echo "## Build"
            echo ""
            echo "- Command: \`npm run build\`"
            echo "- Cache: \`.next/cache\` saved as \`next-cache-${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: true
      - name: Summary
        if: always()
        run: |
          {
            echo "## E2E smoke"
            echo ""
            echo "- Browser: Chromium"
            echo "- Command: \`npm run test:e2e\`"
          } >> "$GITHUB_STEP_SUMMARY"
