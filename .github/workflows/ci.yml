name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run npm audit (JSON)
        id: audit_run
        shell: bash
        run: |
          set -euo pipefail
          npm audit --audit-level=low --json | tee audit.json
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Audit results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.audit_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f audit.json ]; then
            node -e "const fs=require('fs');const audit=JSON.parse(fs.readFileSync('audit.json','utf8'));const meta=audit.metadata||{};const v=(meta.vulnerabilities)||{};const total=(v.low||0)+(v.moderate||0)+(v.high||0)+(v.critical||0);console.log('- Vulnerabilities: **'+total+'** (low '+(v.low||0)+', moderate '+(v.moderate||0)+', high '+(v.high||0)+', critical '+(v.critical||0)+')');" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- audit.json: **missing**" >> "$GITHUB_STEP_SUMMARY"
          fi

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint (JSON)
        id: lint_run
        shell: bash
        run: |
          set -euo pipefail
          npx eslint . --max-warnings 0 -f json | tee eslint.json
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Lint results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.lint_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ -f eslint.json ]; then
            node -e "const fs=require('fs');const results=JSON.parse(fs.readFileSync('eslint.json','utf8'));let e=0,w=0;for(const r of results){e+=r.errorCount||0;w+=r.warningCount||0;}console.log('- Total: **'+e+'** errors, **'+w+'** warnings');" >> "$GITHUB_STEP_SUMMARY"
            node -e "const fs=require('fs');const results=JSON.parse(fs.readFileSync('eslint.json','utf8'));const bad=results.filter(r=>((r.errorCount||0)+(r.warningCount||0))>0);if(!bad.length) process.exit(0);console.log('');console.log('### Files with issues (first 20)');for(const f of bad.slice(0,20)){console.log('- `'+f.filePath+'` ('+(f.errorCount||0)+' errors, '+(f.warningCount||0)+' warnings)');}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- eslint.json: **missing**" >> "$GITHUB_STEP_SUMMARY"
          fi

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript typecheck
        id: typecheck_run
        shell: bash
        run: |
          set -euo pipefail
          npm run typecheck 2>&1 | tee tsc.log
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Typecheck results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.typecheck_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f tsc.log ]; then
            node -e "const fs=require('fs');const log=fs.readFileSync('tsc.log','utf8');const errs=log.split(/\\r?\\n/).filter(l=>/\\berror TS\\d+:\\b/.test(l));console.log('- TypeScript errors: **'+errs.length+'**');if(errs.length){console.log('');console.log('### Error excerpt (first 40)');for(const l of errs.slice(0,40)) console.log('- '+l);}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- tsc.log: **missing**" >> "$GITHUB_STEP_SUMMARY"
          fi

  unit:
    name: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (coverage)
        id: unit_run
        shell: bash
        run: |
          set -euo pipefail
          npm run test:coverage -- --reporter=json --outputFile=vitest-results.json 2>&1 | tee vitest.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Unit test results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.unit_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ -f vitest-results.json ]; then
            node -e "const fs=require('fs');const r=JSON.parse(fs.readFileSync('vitest-results.json','utf8'));const s=(r && typeof r==='object')?r:{};const suitesTotal=s.numTotalTestSuites??0;const suitesPassed=s.numPassedTestSuites??0;const suitesFailed=s.numFailedTestSuites??0;const testsTotal=s.numTotalTests??0;const testsPassed=s.numPassedTests??0;const testsFailed=s.numFailedTests??0;const testsPending=s.numPendingTests??0;const testsTodo=s.numTodoTests??0;console.log('- Suites: **'+suitesPassed+'/'+suitesTotal+'** passed (**'+suitesFailed+'** failed)');console.log('- Tests: **'+testsPassed+'/'+testsTotal+'** passed (**'+testsFailed+'** failed, **'+testsPending+'** pending, **'+testsTodo+'** todo)');if(s.testResults){const failed=(s.testResults||[]).filter(tr=>tr.status==='failed');if(failed.length){console.log('');console.log('### Failed suites (up to 10)');for(const f of failed.slice(0,10)){console.log('- `'+f.name+'`');const msgs=[];for(const a of (f.assertionResults||[])){for(const m of (a.failureMessages||[])) msgs.push(m);}if(msgs.length){const excerpt=msgs.join('\\n').split('\\n').slice(0,12).join('\\n');console.log('```');console.log(excerpt);console.log('```');}}}}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- vitest-results.json: **missing**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Coverage artifact: **coverage** (retention 7 days)" >> "$GITHUB_STEP_SUMMARY"

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [audit, lint, typecheck, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        id: build_run
        shell: bash
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee build.log
      - uses: actions/cache/save@v6
        if: always()
        with:
          path: .next/cache
          key: next-cache-${{ github.sha }}
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## Build results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.build_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build.log ]; then
            node -e "const fs=require('fs');const log=fs.readFileSync('build.log','utf8');const nextLine=log.split(/\\r?\\n/).find(l=>l.includes('Next.js'));if(nextLine) console.log('- '+nextLine.trim());const i=log.indexOf('Route (app)');if(i>=0){console.log('');console.log('### Routes (excerpt)');const ex=log.slice(i).split(/\\r?\\n/).slice(0,15);for(const l of ex) console.log('- '+l);}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Cache saved: \`.next/cache\` (key: \`next-cache-${{ github.sha }}\`)" >> "$GITHUB_STEP_SUMMARY"

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        id: pw_install
        run: npx playwright install --with-deps chromium
      - name: Run E2E (JSON reporter)
        id: e2e_run
        shell: bash
        run: |
          set -euo pipefail
          npx playwright test --reporter=json | tee playwright.json
        env:
          CI: true
      - name: Summary
        if: always()
        shell: bash
        run: |
          echo "## E2E smoke results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Outcome: **${{ steps.e2e_run.outcome }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Browser: Chromium" >> "$GITHUB_STEP_SUMMARY"
          if [ -f playwright.json ]; then
            node -e "const fs=require('fs');const json=JSON.parse(fs.readFileSync('playwright.json','utf8'));const s=json.stats||{};const expected=s.expected||0;const unexpected=s.unexpected||0;const flaky=s.flaky||0;const skipped=s.skipped||0;console.log('- Tests: **'+expected+'** passed, **'+unexpected+'** failed, **'+flaky+'** flaky, **'+skipped+'** skipped');" >> "$GITHUB_STEP_SUMMARY"
          else
            echo \"- playwright.json: **missing**\" >> \"$GITHUB_STEP_SUMMARY\"
          fi
